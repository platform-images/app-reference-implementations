name: Release

on:
  push:
    branches: [main]
    paths: ['apps/*/Dockerfile']
  workflow_dispatch:
    inputs:
      app:
        description: 'App to release'
        required: true
        default: all
        type: choice
        options: [all, nodejs-api, python-api, java-api, nginx-proxy]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  setup:
    name: Select apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.pick.outputs.apps }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.app }}" != "all" ]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'apps=["nodejs-api","python-api","java-api","nginx-proxy"]' >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.setup.outputs.apps) }}
    env:
      IMAGE: ghcr.io/platform-images/${{ matrix.app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign image (keyless)
        run: |
          cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ matrix.app }}/sha-${{ github.sha }}
          name: ${{ matrix.app }} — ${{ github.sha }}
          body: |
            Triggered by base image digest update.

            **Pull:**
            ```
            docker pull ${{ env.IMAGE }}:latest
            docker pull ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            **Verify signature:**
            ```
            cosign verify \
              --certificate-identity-regexp="https://github.com/platform-images/app-reference-implementations" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            Platforms: `linux/amd64` `linux/arm64`
          files: sbom.spdx.json
