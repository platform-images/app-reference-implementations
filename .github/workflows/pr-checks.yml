name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^apps/' \
            | cut -d/ -f2 \
            | sort -u \
            | jq -R . | jq -sc .)
          if [ "$CHANGED" = "[]" ]; then
            CHANGED='["nodejs-api","python-api","java-api","nginx-proxy"]'
          fi
          echo "apps=$CHANGED" >> "$GITHUB_OUTPUT"

  sast:
    name: SAST — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config=auto --error apps/${{ matrix.app }} \
            --sarif-output=semgrep-${{ matrix.app }}.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: semgrep-${{ matrix.app }}.sarif
          category: semgrep-${{ matrix.app }}

  sca:
    name: SCA — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy SCA on dependencies
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  build:
    name: Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: apps/${{ matrix.app }}
          push: false
          load: true
          tags: ${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  pr-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [sast, sca, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.sast.result }}" == "failure" || \
                "${{ needs.sca.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
